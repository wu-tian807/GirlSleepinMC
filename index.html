<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC Sleep Anim</title>
  <link rel="stylesheet" href="fonts/fonts.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="layerA" class="layer"><video id="videoA" playsinline muted></video></div>
  <div id="layerB" class="layer"><video id="videoB" playsinline muted></video></div>

  <canvas id="darkness-canvas"></canvas>
  <canvas id="flame-canvas"></canvas>

  <!-- 火力调节滑条 -->
  <div id="light-slider-ui">
    <div class="slider-row">
      <span class="row-label">fire</span>
      <span>🪨</span>
      <input id="furnace-slider" type="range" min="0" max="100" value="50" step="1">
      <span>🔥</span>
      <span id="furnace-val">50</span>
    </div>
  </div>

  <!-- 睡梦气泡 -->
  <div id="speech-bubble">
    <img src="dialogue_noBG.png" alt="">
    <span id="bubble-text"></span>
  </div>

  <!-- 工作台悬浮标牌 + 抽屉面板 -->
  <div id="wb-title" data-wb-ui>
    <img id="wb-title-img" src="ui/title.png" alt="">
    <div id="mp-song-label"></div>
  </div>
  <div id="wb-panel" data-wb-ui>
    <div id="wb-panel-inner">
      <img src="ui/body_final_cut.png" id="wb-body-img" alt="">
      <!-- 音乐菜单叠加层，随 body 一起滑入/滑出 -->
      <div id="wb-menu"></div>
    </div>
  </div>

  <div id="unmute-tip">CLICK TO UNMUTE</div>
  <div id="hud"></div>
  <button id="turn-btn">turn()</button>

  <!-- 熔炉 GUI 弹窗 -->
  <div id="furnace-gui" class="hidden">
    <div id="furnace-gui-inner">
      <img id="furnace-bg" src="textures/gui/furnace.png" alt="" draggable="false">
      <!-- 输入槽（原木） -->
      <div id="fslot-input"  class="fslot"></div>
      <!-- 燃料槽 -->
      <div id="fslot-fuel"   class="fslot"></div>
      <!-- 产物槽（木炭） -->
      <div id="fslot-output" class="fslot"></div>
      <!-- 火焰高度指示 -->
      <div id="ffuel-bar"><img src="textures/gui/furnace_lit_progress.png" alt="" draggable="false"></div>
      <!-- 烧制进度箭头 -->
      <div id="fsmelt-arrow"><img src="textures/gui/furnace_burn_progress.png" alt="" draggable="false"></div>
      <!-- 烧制进度文字（右下角，方便确认进度） -->
      <div id="fsmelt-label"></div>
    </div>
  </div>
  <!-- 鼠标持有的物品 -->
  <div id="furnace-held"></div>

  <!-- load order matters: shared state first, then modules -->
  <script src="js/shared.js"></script>
  <script src="js/save.js"></script>
  <script src="music-manifest.js"></script>
  <script src="js/video.js"></script>
  <script src="js/audio-crackle.js"></script>
  <script src="js/bubble.js"></script>
  <script src="js/furnace-effects.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/lighting.js"></script>
  <script src="js/furnace-ui.js"></script>
  <script src="js/music-player.js"></script>
  <script src="js/slot-editor.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
